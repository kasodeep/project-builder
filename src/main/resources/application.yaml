spring:
  application:
    name: project-builder

  profiles:
    active: prod   # overridden by SPRING_PROFILES_ACTIVE env var in Railway

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME:neondb_owner}
    driver-class-name: org.postgresql.Driver

  # ── Cache — type overridden per profile ──────────────────────────────────────
  cache:
    cache-names:
      - projects-by-team
      - task-by-id
      - tasks-by-project
      - tasks-for-user

  # ── Async executor ────────────────────────────────────────────────────────────
  task:
    execution:
      pool:
        core-size: 4
        max-size: 20
        queue-capacity: 200
        keep-alive: 60s
      thread-name-prefix: analytics-
    scheduling:
      pool:
        size: 2
      thread-name-prefix: scheduler-

# ── MyBatis ───────────────────────────────────────────────────────────────────
mybatis:
  mapper-locations:
    - classpath:mappers/*.xml
    - classpath:resultMaps/*.xml
  type-handlers-package: fury.deep.project_builder.mybatis
  type-aliases-package: fury.deep.project_builder.entity

# ── Outbox ────────────────────────────────────────────────────────────────────
outbox:
  worker:
    delay-ms: 10000
    batch-size: 50
    max-retry: 5
    max-idle-skip: 16

# ── Actuator (shared baseline — profiles extend this) ─────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, loggers
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
    enable:
      hikaricp: true
      jvm: true
      executor: true
  tracing:
    sampling:
      probability: 1.0   # overridden per profile